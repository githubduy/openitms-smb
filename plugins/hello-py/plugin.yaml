name: hello-py
version: 0.1.0
license: MIT
description: Minimal Python example plugin — proves the .proto contract is language-agnostic
protocol_version: 1
entrypoint:
  python: main.py
routes:
  - method: POST
    path: echo
    description: Echo request body back
  - method: GET
    path: info
    description: Plugin info
permissions: []
