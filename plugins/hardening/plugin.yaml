name: hardening
version: 0.1.0
license: MIT
description: Scan the OpenITMS-SMB host security configuration and fix file-permission issues
protocol_version: 1
entrypoint:
  linux-amd64: hardening
  windows-amd64: hardening.exe
routes:
  - method: GET
    path: scan
    description: Scan host security configuration
  - method: POST
    path: fix
    description: Fix a fixable finding (file permissions)
    require_admin: true
permissions:
  - settings:read
