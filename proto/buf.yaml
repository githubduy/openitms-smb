version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # Style choice có chủ đích: giữ tên message ngắn (Metadata, HttpRequest, TaskSpec...)
    # — hợp đồng semantics nằm ở docs/L2-specs/proto-contract.md. Breaking-change vẫn
    # bị chặn bởi buf breaking (FILE mode).
    - SERVICE_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE   # nghiêm nhất — khớp luật "chỉ thêm, không đổi/xóa"
