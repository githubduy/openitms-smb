# SonarQube — OpenITMS-SMB (self-host, quét CHỈ code của dự án, không quét upstream/).
# LƯU Ý BẢO MẬT: KHÔNG đặt sonar.host.url / sonar.token / IP nội bộ ở đây — file này
# public trên GitHub. Host + token truyền qua CLI/env khi scan (xem scripts/sonar-scan.sh).
sonar.projectKey=openitms-smb
sonar.projectName=OpenITMS-SMB
sonar.projectVersion=0.1.0

# CHỈ quét code của ta — upstream/ (Semaphore gốc, MIT) KHÔNG quét (luật #1: core sạch).
sonar.sources=plugin-manager,sdk,plugins,registry,proto/quickwin,scripts,installer

# Tách test khỏi source (chỉ trong thư mục code của ta — không đụng upstream)
sonar.tests=plugin-manager,sdk,plugins,registry
sonar.test.inclusions=**/*_test.go

# Loại trừ: generated, toolchain, build output, submodule, deps, patch, cache/venv
sonar.exclusions=**/upstream/**,**/proto/gen/**,**/Go/**,**/dist/**,**/vendor/**,**/node_modules/**,**/*.pb.go,**/*_grpc.pb.go,**/.*/**,**/__pycache__/**,**/venv/**,**/.venv/**,**/*.pyc,**/*.patch

sonar.sourceEncoding=UTF-8
