# P4-04 — release pipeline: trigger khi push tag quickwin-v* (CHỈ maintainer tạo tag ký).
# Build dist native → release note → GitHub Release → publish registry public (GitHub Pages).
# Secret cần: REGISTRY_PRIVATE_KEY (ký index registry). Tag ký số là điểm kiểm soát cuối.
name: release
on:
  push:
    tags: ["quickwin-v*"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, fetch-depth: 0 }
      - run: scripts/setup-toolchain.sh
      - run: scripts/apply-patches.sh

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Build frontend (web UI → api/public)
        working-directory: upstream/web
        env:
          NODE_OPTIONS: --openssl-legacy-provider   # vue-cli-service trên node 17+
        run: |
          npm ci || npm install
          npm run build

      - name: Build dist (native, no Docker) — Linux + Windows
        env:
          OPENITMS_VERSION: ${{ github.ref_name }}   # quickwin-vX.Y.Z → strip prefix dưới
        run: |
          export OPENITMS_VERSION="${OPENITMS_VERSION#quickwin-v}"   # tên gói khớp tag
          scripts/build-all.sh            # nhúng UI vừa build ở api/public (không placeholder)
          installer/fetch-deps.sh         # tải MariaDB/pwsh/Gitea (Linux + Windows) — verify sha256
          installer/package.sh            # → dist/openitms-smb-*-linux-amd64.tar.gz
          installer/package-windows.sh    # → dist/openitms-smb-*-windows-amd64.zip (cross-compile)

      - name: License compliance (bắt buộc trong artifact)
        run: |
          test -f LICENSE && test -f LICENSE-SEMAPHORE && test -f NOTICE.md
          go install github.com/google/go-licenses@latest
          (cd upstream && go-licenses report ./... > "$GITHUB_WORKSPACE/dist/THIRD_PARTY_LICENSES.md" 2>/dev/null || true)
          # KHÔNG để file rỗng (GitHub từ chối upload asset 0 byte)
          [ -s dist/THIRD_PARTY_LICENSES.md ] || printf '# Third-party licenses\nSee each module source repo (go-licenses report unavailable in this build).\n' > dist/THIRD_PARTY_LICENSES.md
          cp LICENSE LICENSE-SEMAPHORE NOTICE.md dist/ 2>/dev/null || true

      - name: Checksums + SBOM
        run: |
          cd dist && find . -type f -exec sha256sum {} \; > SHA256SUMS

      - name: Release notes (Conventional Commits)
        id: notes
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## ${GITHUB_REF_NAME}" > notes.md
          git log ${prev:+$prev..}HEAD --pretty='- %s' --no-merges >> notes.md

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 0.x hoặc có hậu tố -rc/-beta/-alpha => pre-release (AI được tạo). Stable => maintainer.
          prerelease: ${{ startsWith(github.ref_name, 'quickwin-v0.') || contains(github.ref_name, '-') }}
          body_path: notes.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
            dist/SHA256SUMS
            dist/THIRD_PARTY_LICENSES.md

  publish-registry:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/setup-toolchain.sh
      - name: Build + sign public registry
        env:
          REGISTRY_PRIVATE_KEY: ${{ secrets.REGISTRY_PRIVATE_KEY }}
        run: |
          # build registryctl (module riêng) rồi build+ký registry public từ public-spec.json
          (cd registry && "$GITHUB_WORKSPACE/Go/go/bin/go" build -o /tmp/registryctl ./cmd/registryctl)
          test -f registry/public-spec.json && \
            /tmp/registryctl build public ./public-registry registry/public-spec.json || \
            echo "public-spec.json chưa có — bỏ qua publish"
      - name: Deploy GitHub Pages
        if: hashFiles('public-registry/index.json') != ''
        uses: actions/upload-pages-artifact@v3
        with: { path: public-registry }
