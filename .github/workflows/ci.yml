# CI skeleton (P0-08) — build + patch-chain + hygiene + license + secret scan.
# SonarQube self-host gắn ở Phase 4 (P4-03).
name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Toolchain (pin ./Go/, không dùng Go hệ thống)
        run: scripts/setup-toolchain.sh
      - name: Upstream sạch tại baseline
        run: git -C upstream diff --quiet && git -C upstream diff --cached --quiet
      - name: Apply patch chain
        run: scripts/apply-patches.sh
      - name: Build
        run: scripts/build-all.sh
      - name: Tests
        run: scripts/run-tests.sh

  patch-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Bộ-4: mỗi patch trong series phải có .patch + spec L2 + entry CHANGELOG"
        run: |
          set -e
          fail=0
          grep -vE '^\s*(#|$)' core-patches/series | while read -r p; do
            base="${p%.patch}"
            [ -f "core-patches/$p" ] || { echo "MISSING patch file: $p"; fail=1; }
            [ -f "docs/L2-specs/core-patches/$base.md" ] || { echo "MISSING spec: $base.md"; fail=1; }
            grep -q "$p" core-patches/CHANGELOG.md || { echo "MISSING changelog entry: $p"; fail=1; }
          done
          exit $fail

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-go@v5
        with: { go-version-file: go-version.txt }
      - name: go-licenses check (fail nếu GPL/AGPL link trực tiếp)
        run: |
          go install github.com/google/go-licenses@latest
          cd upstream && go-licenses check ./... --disallowed_types=forbidden,restricted || exit 1
      - name: Verify license files tồn tại
        run: test -f LICENSE && test -f LICENSE-SEMAPHORE && test -f NOTICE.md

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  banned-words:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Chặn từ khóa nhận diện cá nhân/công ty (regex từ secret, không nằm trong repo)
        env:
          BANNED_WORDS_REGEX: ${{ secrets.BANNED_WORDS_REGEX }}
        run: scripts/check-banned-words.sh --all

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          # breaking so với main — enforce luật "chỉ thêm, không đổi/xóa" (guideline #4)
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: scripts/setup-toolchain.sh
      - run: scripts/apply-patches.sh
      - run: scripts/build-all.sh
      - run: tests/e2e/smoke.sh
      - run: tests/e2e/plugin-through-core.sh
      - run: tests/e2e/registry-through-core.sh

  templates-lint:
    # P3-05: lint playbook templates (shellcheck cho .sh; PSScriptAnalyzer/ansible-lint sau)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck templates + installer + scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          find templates installer scripts tests -name '*.sh' -print0 | xargs -0 shellcheck -S warning || true
          # fail chỉ trên lỗi nghiêm trọng (severity error)
          find templates installer scripts tests -name '*.sh' -print0 | xargs -0 shellcheck -S error

  python-plugin:
    # P3-06: chứng minh hợp đồng .proto đa ngôn ngữ — Python plugin qua Plugin Manager
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-go@v5
        with: { go-version-file: go-version.txt }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install grpcio + gen Python stubs
        run: |
          pip install grpcio grpcio-tools
          scripts/gen-proto-py.sh
      - name: Go↔Python integration test
        env:
          PYTHONPATH: ${{ github.workspace }}/sdk/python:${{ github.workspace }}/proto/gen/python
        run: |
          cd plugin-manager
          go test -tags python_integration -run TestPython ./...

  ui-build:
    # P1-07b + verify patch 0002/0003 trên UI thật: build frontend Vue (cần node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Apply patches (branding 0002 + banner 0003 chạm web/)
        run: scripts/apply-patches.sh
      - name: npm ci + build frontend
        working-directory: upstream/web
        run: |
          npm ci
          npm run build
      - name: Verify branding đã vào bundle build
        run: |
          grep -rq "OpenITMS-SMB" upstream/api/public/index.html || \
            { echo "ERROR: title OpenITMS-SMB không có trong index.html đã build"; exit 1; }
          echo "OK: branding present in built UI"
